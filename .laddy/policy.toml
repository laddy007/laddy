# laddy's OWN target-side merge policy (M1) - this is laddy dogfooding itself,
# so the "target" here is the engine. It is NOT a generic template: it doubles
# as a worked example an adopter can read, but copy-and-edit for your own
# project (coverage package, security surface) rather than shipping it verbatim.
# The engine (orchestrator.target_policy) loads it; there is NO built-in
# fallback, so a missing or malformed file fails the merge closed.
#
# Generic globs (secrets, .claude/.mcp agent config, the whole engine surface -
# orchestrator/, scripts/, roles/, prompts/, oracle/, monitoring/, docker/,
# security/, skills/ - the gate infra, and THIS file) are ENGINE constants
# (target_policy.ENGINE_SENSITIVE_GLOBS) and always apply. You only declare the
# extra PRODUCT surface below. Editing this file is itself L3 (human-gated) and
# the off-VPS merge check reads it from trusted main, so a task branch cannot
# weaken its own classification.

# Coverage package for the binding gate's `pytest --cov=<pkg>`.
coverage_package = "orchestrator"

# laddy has no product code beyond the engine, and every engine path is already
# an ENGINE_SENSITIVE_GLOB (see above) applied to every target - so there is no
# extra product-specific sensitive surface to add here.
sensitive_globs = []

# laddy's security surface = the trust-boundary code. A change to any of these
# is a stop-before-merge (human-gated) condition: they ARE the merge / gate /
# policy / terminal authority, so laddy must never auto-merge a change to its
# own trust boundary while dogfooding itself. Weakening the SAST ruleset counts.
security_globs = [
  "orchestrator/local_merge.py",
  "orchestrator/merge_check.py",
  "orchestrator/policy.py",
  "orchestrator/target_policy.py",
  "orchestrator/testgate.py",
  "orchestrator/verdict.py",
  "orchestrator/gitops.py",
  "orchestrator/terminals.py",
  ".laddy/security/semgrep.yml",
]

# Architecture-contract / drift-pin tests: weakening one to make a change pass
# is a senior-review trigger and a stop-before-merge condition.
invariant_tests = [
  "tests/test_target_policy.py",
  "tests/test_terminals.py",
  "tests/test_trust_blockers.py",
]

# laddy's tests all live under tests/, the engine default that always applies
# (target_policy.ENGINE_TEST_DIRS) - a target may only ADD test locations here
# (e.g. "src/tests/"), never remove the tests/ default.
test_dirs = []

# laddy has no DB migrations.
migration_globs = []

# laddy has no frontend build.
frontend_prefixes = []
frontend_gate = ""
user_visible_prefixes = []

# Markdown is already engine-safe (ENGINE_SAFE_GLOBS); laddy ships no product
# data catalogues (i18n JSON, etc.) that would ride L1.
safe_globs = []