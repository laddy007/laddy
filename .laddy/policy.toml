# Per-target merge policy (M1). This file is the TEMPLATE a new target seeds
# from; copy it to <target>/.laddy/policy.toml and replace the myapp values with
# your project's. The engine (orchestrator.target_policy) loads it; there is NO
# built-in fallback, so a missing or malformed file fails the merge closed.
#
# Generic globs (secrets, .claude/.mcp agent config, engine surfaces, the gate
# infra, and THIS file) are engine constants and always apply - you only declare
# the PRODUCT-specific surface below. Editing this file is itself L3 (human-gated)
# and the off-VPS merge check reads it from trusted main, so a task branch cannot
# weaken its own classification.

# Coverage package for the binding gate's `pytest --cov=<pkg>`.
coverage_package = "myapp"

# Product paths that must never ride an L2 auto-merge (models, migrations,
# deploy/release config). Merged on top of the engine-generic sensitive set.
sensitive_globs = [
  "myapp/models.py",
  "myapp/infrastructure/runtime_db.py",
  "alembic/*",
  "alembic/**/*",
  "cloudbuild.yaml",
  "scripts/release*.ps1",
  "docker-entrypoint.sh",
  "Dockerfile",
  "firebase.json",
  ".firebaserc",
]

# Security / auth / payments surface (a stop-before-merge condition).
security_globs = [
  "myapp/api/routers/auth*.py",
  "myapp/api/services/auth*.py",
  "myapp/infrastructure/auth_repo.py",
  "myapp/application/access.py",
  "myapp/api/routers/sessions.py",
  "myapp/api/routers/payments.py",
  "myapp/api/routers/*webhook*.py",
  "myapp/application/payments/*",
  "myapp/application/payments/**/*",
  "myapp/infrastructure/payments/*",
  "myapp/infrastructure/payments/**/*",
]

# Architecture-contract / append-only invariant tests: touching one is a senior
# review trigger and a stop-before-merge condition (test weakening).
invariant_tests = [
  "tests/test_architecture_contracts.py",
  "tests/test_append_only_session_history.py",
  "tests/test_inbox_audit_append_only.py",
  "tests/test_admin_user_notes_append_only.py",
  "tests/test_player_challenge_answer_append_only.py",
  "tests/test_invariants_append_only_game_edit_event.py",
  "tests/test_purchase_payment_received_at_immutable.py",
]

# Migration files scanned for destructive drop_table/drop_column.
migration_globs = ["alembic/*", "alembic/**/*"]

# Frontend build: which path prefixes trigger it, and the gate command itself.
frontend_prefixes = ["frontend/", "apps/", "packages/"]
frontend_gate = "pnpm install --frozen-lockfile && pnpm -r --if-present build && pnpm -r --if-present test && cd frontend && npx tsc --noEmit"

# "user-visible" heuristic for the auto-merge+notify decision.
user_visible_prefixes = ["frontend/", "apps/"]

# Product data catalogues that are safe-by-construction (strings, not logic).
# Merged on top of the engine default (*.md). Added files here can ride L1.
safe_globs = [
  "frontend/src/i18n/locales/**/*.json",
  "frontend/**/locales/**/*.json",
  "apps/**/locales/**/*.json",
]
